name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install Pillow

      - name: Generate Flutter project
        run: python generate_flutter_utan.py

      - name: Debug – list generated files
        run: |
          echo "=== Root ==="
          ls -la
          if [ -d "UTan_Flutter" ]; then
            echo "=== UTan_Flutter/lib ==="
            find UTan_Flutter/lib -type f | sort
            echo "=== UTan_Flutter/android ==="
            find UTan_Flutter/android -type f | sort
          else
            echo "UTan_Flutter directory NOT found!"
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create base Flutter project
        run: flutter create --project-name utan_flutter build_project

      - name: Copy generated code + assets
        run: |
          # lib
          rm -rf build_project/lib/*
          cp -r UTan_Flutter/lib/* build_project/lib/

          # pubspec
          cp UTan_Flutter/pubspec.yaml build_project/pubspec.yaml

          # assets
          mkdir -p build_project/assets
          cp -r UTan_Flutter/assets/* build_project/assets/

          # Android – full overlay (Manifest, kotlin, res, gradle files)
          cp UTan_Flutter/android/app/src/main/AndroidManifest.xml \
             build_project/android/app/src/main/AndroidManifest.xml

          cp UTan_Flutter/android/app/src/main/kotlin/com/utan/flutter/MainActivity.kt \
             build_project/android/app/src/main/kotlin/com/utan/flutter/MainActivity.kt 2>/dev/null || true

          cp -r UTan_Flutter/android/app/src/main/res/* \
             build_project/android/app/src/main/res/

          cp UTan_Flutter/android/app/build.gradle \
             build_project/android/app/build.gradle

          cp UTan_Flutter/android/build.gradle \
             build_project/android/build.gradle

          cp UTan_Flutter/android/settings.gradle \
             build_project/android/settings.gradle

          cp UTan_Flutter/android/gradle.properties \
             build_project/android/gradle.properties

      # ── Widen Dart SDK constraint so pub get never fails ───────────────
      - name: Patch pubspec SDK constraint
        run: |
          python3 - << 'PYEOF'
          import pathlib, re
          p = pathlib.Path('build_project/pubspec.yaml')
          t = p.read_text()
          t = re.sub(r"sdk:\s*['\"]>=3\.\d+\.\d+ <4\.0\.0['\"]",
                     "sdk: '>=3.2.0 <4.0.0'", t)
          p.write_text(t)
          print('pubspec SDK constraint:',
                [l for l in t.splitlines() if 'sdk' in l.lower()])
          PYEOF

      - name: flutter pub get
        working-directory: ./build_project
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: ./build_project
        run: dart run flutter_launcher_icons

      - name: Build release APK
        working-directory: ./build_project
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build_project/build/app/outputs/flutter-apk/app-release.apk
